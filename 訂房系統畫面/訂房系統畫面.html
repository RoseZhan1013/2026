<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂房系統畫面</title>
    <link rel="stylesheet" href="訂房系統畫面.css">

</head>

<body>
    <!-- ====================================== -->
    <!--               HTML區域                  -->
    <!-- ====================================== -->
    <header>
        <h1>R_HOTEL</h1>
        <p>太空艙住宿空間</p>
    </header>

    <main class="container">
        <!-- 1. 搜尋與動態篩選功能區塊 -->
        <section class="search-section">
            <form class="search-form" id="searchForm" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="checkIn">入住日期</label>
                    <input type="date" id="checkIn" required>
                </div>
                <div class="form-group">
                    <label for="checkOut">退房日期</label>
                    <input type="date" id="checkOut" required>
                </div>
                <div class="form-group">
                    <label for="guests">入住人數</label>
                    <select id="guests">
                        <option value="1">1 人</option>
                        <option value="2" selected>2 人</option>
                        <option value="3">3 人</option>
                        <option value="4">4 人</option>
                    </select>
                </div>
                <button type="button" class="btn-search" onclick="handleSearch()">搜尋與篩選</button>
            </form>
        </section>

        <!-- 1. 房型探索列表 -->
        <section class="room-grid" id="roomGrid">
            <!-- 房型資料將透過 JavaScript 動態渲染 -->
        </section>
    </main>

    <!-- 2. 訂單詳情與試算彈出視窗 -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-content">
            <div class="modal-header">預定明細確認</div>
            <div id="modalReceiptBody">
                <!-- 試算明細動態生成 -->
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="confirmBooking()">確認預定</button>
            </div>
        </div>
    </div>

    <!-- 成功提示彈出訊息 -->
    <div class="alert-toast" id="successToast">系統提示：預定成功！已為您保留艙房。</div>
    <!-- ====================================== -->
    <!--                 js區域                  -->
    <!-- ====================================== -->
    <script>
        // 模擬房型資料庫
        const roomsData = [
            { id: 1, name: "極簡單人艙", price: 1200, maxGuests: 1, image: "img/hotel-1.webp" },
            { id: 2, name: "豪華艙", price: 2500, maxGuests: 1, image: "img/hotel-deluxe.webp" },
            { id: 3, name: "混合艙", price: 8000, maxGuests: 10, image: "img/hotel-mix.webp" },
            { id: 4, name: "小型艙", price: 2000, maxGuests: 2, image: "img/hotel-small.webp" }
        ];

        let selectedRoom = null;
        let bookingDays = 1;

        // 初始化：設定預設日期防呆 (入住選今天，退房選明天)
        window.onload = function () {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            document.getElementById('checkIn').value = today.toISOString().split('T')[0];
            document.getElementById('checkOut').value = tomorrow.toISOString().split('T')[0];

            // 首次加載渲染全部房型
            renderRooms(roomsData);
        };

        // 1. 房型渲染函式
        function renderRooms(rooms) {
            const roomGrid = document.getElementById('roomGrid');
            roomGrid.innerHTML = '';

            if (rooms.length === 0) {
                roomGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">沒有符合人數要求的艙房。</div>`;
                return;
            }

            rooms.forEach(room => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <!-- 這裡改用 img 標籤引入圖片網址 -->
                    <div class="room-image">
                        <img src="${room.image}" alt="${room.name}">
                    </div>
                    <div class="room-info">
                        <div class="room-title">${room.name}</div>
                        <div class="room-meta">
                            <span>上限 ${room.maxGuests} 人</span>
                            <span class="room-price">$${room.price} <span>/ 晚</span></span>
                        </div>
                        <button class="btn-book" onclick="openBooking(${room.id})">立即預訂</button>
                    </div>
                `;
                roomGrid.appendChild(card);
            });
        }

        // 1 & 3. 搜尋、即時篩選與必填/日期防呆機制
        function handleSearch() {
            const checkInInput = document.getElementById('checkIn').value;
            const checkOutInput = document.getElementById('checkOut').value;
            const guestsCount = parseInt(document.getElementById('guests').value);

            // 3. 必填欄位防呆
            if (!checkInInput || !checkOutInput) {
                alert("請務必選擇入住與退房日期！");
                return;
            }

            const checkInDate = new Date(checkInInput);
            const checkOutDate = new Date(checkOutInput);

            // 3. 日期邏輯防呆
            if (checkOutDate <= checkInDate) {
                alert("錯誤：退房日期必須晚於入住日期！");
                return;
            }

            // 1. 即時動態過濾符合人數的房型
            const filteredRooms = roomsData.filter(room => room.maxGuests >= guestsCount);
            renderRooms(filteredRooms);
        }

        // 2. 啟動預定流程、動態試算明細
        function openBooking(roomId) {
            const checkInInput = document.getElementById('checkIn').value;
            const checkOutInput = document.getElementById('checkOut').value;

            // 再次確保預訂時已有日期且邏輯正確
            if (!checkInInput || !checkOutInput) {
                alert("請先選擇入住與退房日期再進行預訂。");
                return;
            }
            const checkInDate = new Date(checkInInput);
            const checkOutDate = new Date(checkOutInput);

            if (checkOutDate <= checkInDate) {
                alert("退房日期必須晚於入住日期，請重新檢查上方搜尋欄位。");
                return;
            }

            // 計算住宿天數
            const timeDiff = checkOutDate.getTime() - checkInDate.getTime();
            bookingDays = Math.ceil(timeDiff / (1000 * 3600 * 24));

            // 找到點擊的房型資料
            selectedRoom = roomsData.find(r => r.id === roomId);

            // 2. 自動試算：總價 = 天數 * 每晚價格
            const totalCost = bookingDays * selectedRoom.price;

            // 2. 渲染明細到 Modal 中
            const receiptBody = document.getElementById('modalReceiptBody');
            receiptBody.innerHTML = `
                <div class="receipt-line"><span class="label">預定房型</span><span>${selectedRoom.name}</span></div>
                <div class="receipt-line"><span class="label">入住日期</span><span>${checkInInput}</span></div>
                <div class="receipt-line"><span class="label">退房日期</span><span>${checkOutInput}</span></div>
                <div class="receipt-line"><span class="label">計費天數</span><span>${bookingDays} 晚</span></div>
                <div class="receipt-line"><span class="label">每晚房價</span><span>$${selectedRoom.price}</span></div>
                <div class="receipt-total"><span class="label">總計金額</span><span>$${totalCost}</span></div>
            `;

            // 開啟 Modal
            document.getElementById('bookingModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('bookingModal').classList.remove('active');
        }

        // 2. 狀態反饋：確認預定彈出成功訊息
        function confirmBooking() {
            closeModal();
            const toast = document.getElementById('successToast');

            // 彈出 Toast 訊息
            toast.classList.add('active');

            // 3秒後自動消失
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        //  1. 首頁：房型探索與搜尋
        //  - 房型列表：展示名稱、圖是、價格與人數上限
        //  - 搜尋功能：支援入住/退房日期與人數選擇
        //  - 即時篩選：動態過濾符合入住人數的房型
        //  - 預定入口：點擊『立即預訂』啟動流程

        // 2. 訂單詳情與試算
        //  - 明細顯示：房型、日期、天數與總價彙整
        //  - 自動試算：總價=住宿天數x每晚房價
        //  - 狀態反饋：確認預定後彈出成功訊息提示

        // 3. 欄位防呆機制
        //  - 日期邏輯：退房日期需晚於入住，防止衝突
        //  - 必填欄位：搜尋前需選日期，避免空值錯誤
    </script>
</body>




</html>
